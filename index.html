<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>야자 출결 관리</title>
<style>
:root {
  --primary: #2196F3;
  --primary-dark: #1976D2;
  --success: #4CAF50;
  --warning: #FF9800;
  --danger: #F44336;
  --purple: #9C27B0;
  --bg: #F5F7FA;
  --card: #FFFFFF;
  --text: #333333;
  --text-light: #888888;
  --border: #E0E0E0;
  --seat-empty: #E0E0E0;
  --seat-occupied: #2196F3;
  --seat-duplicate: #FF9800;
  --seat-zero: #9C27B0;
  --tab-height: 56px;
  --header-height: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-tap-highlight-color: transparent;
  padding-bottom: calc(var(--tab-height) + 8px);
}
.header { position: sticky; top:0; z-index: 100; background: var(--primary); color: white; height: var(--header-height); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-shadow: 0 2px 4px rgba(0,0,0,.15); }
.header h1 { font-size: 17px; font-weight: 600; }
.header .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; display: inline-block; vertical-align: middle; }
.badge-ok { background: #4CAF50; color: white; }
.badge-err { background: #F44336; color: white; }
.header .session-select { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: white; padding: 4px 8px; border-radius: 6px; font-size: 13px; }
.header .session-select option { color: #333; }
.tab-bar { position: fixed; bottom:0; left:0; right:0; z-index: 100; background: white; display: flex; height: var(--tab-height); border-top: 1px solid var(--border); box-shadow: 0 -2px 8px rgba(0,0,0,.08); }
.tab-bar .tab-item { flex:1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; font-size: 10px; color: var(--text-light); cursor: pointer; transition: color .2s; text-decoration: none; }
.tab-bar .tab-item.active { color: var(--primary); }
.tab-bar .tab-item svg { width:22px; height:22px; }
.tab-bar .tab-item.active svg { stroke: var(--primary); }
.tab-panel { display: none; padding: 12px; }
.tab-panel.active { display: block; }
.card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.form-group { flex:1; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
.form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; transition: border-color .2s; }
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; width: 100%; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:active { transform: scale(.98); }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; width: auto; border-radius: 6px; }
.stats-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.stat-item { flex:1; min-width: 70px; background: var(--card); border-radius: 10px; padding: 10px 8px; text-align: center; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-item .stat-num { font-size: 22px; font-weight: 700; }
.stat-item .stat-label { font-size: 10px; color: var(--text-light); margin-top: 2px; }
.stat-item.blue .stat-num { color: var(--primary); }
.stat-item.green .stat-num { color: var(--success); }
.stat-item.red .stat-num { color: var(--danger); }
.stat-item.orange .stat-num { color: var(--warning); }
.toast-container { position: fixed; top: 60px; left:50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: #323232; color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards; box-shadow: 0 4px 12px rgba(0,0,0,.2); white-space: nowrap; }
.toast.success { background: var(--success); }
.toast.warning { background: var(--warning); }
.toast.error { background: var(--danger); }
@keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { from { opacity:1; } to { opacity:0; } }
.loading-overlay { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(255,255,255,.7); z-index: 9998; align-items: center; justify-content: center; }
.loading-overlay.show { display: flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.recent-list { list-style: none; }
.recent-list li { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.recent-list li:last-child { border-bottom: none; }
.recent-list .seat-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.seat-grid-container { overflow-x: auto; padding-bottom: 8px; }
.seat-grid { display: grid; grid-template-columns: repeat(18, 1fr); grid-template-rows: repeat(19, auto); gap: 3px; min-width: 540px; padding: 4px; }
.seat { display: flex; align-items: center; justify-content: center; flex-direction: column; background: var(--seat-empty); border-radius: 6px; padding: 4px 2px; min-height: 36px; cursor: pointer; transition: all .2s; font-size: 9px; text-align: center; line-height: 1.2; }
.seat:hover { filter: brightness(.92); transform: scale(1.03); }
.seat .seat-num { font-weight: 700; font-size: 11px; }
.seat .seat-name { font-size: 8px; color: rgba(0,0,0,.6); overflow:hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.seat.occupied { background: var(--seat-occupied); color: white; }
.seat.occupied .seat-name { color: rgba(255,255,255,.85); }
.seat.duplicate { background: var(--seat-duplicate); color: white; }
.seat.duplicate .seat-name { color: rgba(255,255,255,.85); }
.seat.seat-zero { background: var(--seat-zero); color: white; min-height: 50px; }
.seat.seat-zero .seat-name { color: rgba(255,255,255,.85); }
.supervisor-icon { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; font-size: 11px; color: var(--text-light); }
.supervisor-icon svg { width: 28px; height: 28px; }
.modal-bg { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,.5); z-index: 5000; align-items: center; justify-content: center; }
.modal-bg.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.modal h3 { font-size: 16px; margin-bottom: 12px; }
.modal p { font-size: 13px; margin-bottom: 8px; color: #555; }
.modal .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal .modal-actions .btn { flex:1; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
.filter-bar select, .filter-bar input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: #F0F4F8; padding: 8px 6px; font-size: 11px; font-weight: 600; color: var(--text-light); text-align: center; position: sticky; top:0; border-bottom: 2px solid var(--border); }
.data-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:hover { background: #F8FAFC; }
.data-table .checkbox-cell input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }
.radio-group { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
.radio-group label { display: flex; align-items: center; gap: 2px; font-size: 11px; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background .2s; }
.radio-group label:hover { background: #F0F4F8; }
.radio-group input[type="radio"] { accent-color: var(--primary); }
.status-present { color: var(--success); font-weight: 600; }
.status-absent { color: var(--danger); font-weight: 600; }
.status-excused { color: var(--warning); font-weight: 600; }
.settings-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.settings-item:last-child { border-bottom: none; }
.settings-item label { display: block; font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; }
.settings-item input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
.settings-item .btn { margin-top: 8px; }
.student-mode { max-width: 420px; margin: 0 auto; padding: 20px 16px; }
.student-mode .logo { text-align: center; padding: 30px 0 20px; }
.student-mode .logo h2 { font-size: 22px; color: var(--primary); }
.student-mode .logo p { font-size: 13px; color: var(--text-light); margin-top: 4px; }
.student-mode .result-box { margin-top: 16px; padding: 16px; border-radius: 12px; text-align: center; font-size: 15px; font-weight: 600; display: none; }
.student-mode .result-box.success { display: block; background: #E8F5E9; color: var(--success); }
.student-mode .result-box.error { display: block; background: #FFEBEE; color: var(--danger); }
.student-mode .result-box.warning { display: block; background: #FFF3E0; color: var(--warning); }
@media (max-width: 400px) { .seat-grid { gap: 2px; min-width: 480px; } .seat { min-height: 30px; font-size: 8px; padding: 2px 1px; } .seat .seat-num { font-size: 9px; } }
::-webkit-scrollbar { height: 4px; width: 4px; }
::-webkit-scrollbar-thumb { background: #CCC; border-radius: 4px; }
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalContent"></div></div>
<div id="teacherMode" style="display:none;">
  <div class="header">
    <div>
      <h1 style="display:inline;">🏫 야자 출결관리</h1>
      <span class="badge badge-err" id="connBadge">미연결</span>
    </div>
    <select class="session-select" id="sessionSelect" onchange="onSessionChange()">
      <option value="8교시">8교시</option>
      <option value="9교시">9교시</option>
      <option value="야자">야자</option>
      <option value="토요오전">토요(오전)</option>
      <option value="토요오후">토요(오후)</option>
    </select>
  </div>
  <div class="tab-panel active" id="panelCheckIn">
    <div class="card">
      <h3>✅ 출석체크</h3>
      <div class="form-row"><div class="form-group"><label>반</label><select id="ciClass"><option value="">선택</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div><div class="form-group"><label>번호</label><input type="number" id="ciNumber" placeholder="번호" min="1" max="40"></div></div>
      <div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="ciName" placeholder="이름 입력"></div><div class="form-group"><label>좌석번호</label><input type="number" id="ciSeat" placeholder="0~81" min="0" max="81"></div></div>
      <button class="btn btn-primary" onclick="doCheckIn()">✅ 출석체크</button>
    </div>
    <div class="card"><h3>📋 최근 출석 (오늘)</h3><ul class="recent-list" id="recentList"><li style="color:var(--text-light);justify-content:center;">출석 기록이 없습니다.</li></ul></div>
  </div>
  <div class="tab-panel" id="panelSeatMap">
    <div class="stats-bar" id="seatStats"><div class="stat-item blue"><div class="stat-num" id="statTotal">0</div><div class="stat-label">출석</div></div><div class="stat-item"><div class="stat-num" id="statVacant">82</div><div class="stat-label">빈좌석</div></div><div class="stat-item orange"><div class="stat-num" id="statDuplicate">0</div><div class="stat-label">중복</div></div></div>
    <div class="card" style="padding:8px;"><div class="seat-grid-container"><div class="seat-grid" id="seatGrid"></div></div></div>
  </div>
  <div class="tab-panel" id="panelRegistration">
    <div class="filter-bar"><select id="regClassFilter" onchange="renderRegistration()"><option value="">전체 반</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select><span style="font-size:12px;color:var(--text-light);" id="regCount">0명</span><button class="btn btn-sm btn-primary" onclick="loadRegistrationAll()" style="margin-left:auto;">🔄 새로고침</button></div>
    <div class="card" style="padding:8px; overflow-x:auto;"><table class="data-table" id="regTable"><thead><tr><th>#</th><th>인적사항</th><th>8교시</th><th>9교시</th><th>야자</th><th>토요AM</th><th>토요PM</th></tr></thead><tbody id="regBody"></tbody></table></div>
  </div>
  <div class="tab-panel" id="panelAttendance">
    <div class="stats-bar" id="attStats"><div class="stat-item blue"><div class="stat-num" id="attTotal">0</div><div class="stat-label">신청</div></div><div class="stat-item green"><div class="stat-num" id="attPresent">0</div><div class="stat-label">출석</div></div><div class="stat-item red"><div class="stat-num" id="attAbsent">0</div><div class="stat-label">결석</div></div><div class="stat-item orange"><div class="stat-num" id="attExcused">0</div><div class="stat-label">확인결석</div></div></div>
    <div class="filter-bar"><select id="attClassFilter" onchange="renderAttendance()"><option value="">전체 반</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select><button class="btn btn-sm btn-primary" onclick="loadAttendance()" style="margin-left:auto;">🔄 새로고침</button><button class="btn btn-sm btn-success" onclick="initAttRecords()">📝 출석부 생성</button></div>
    <div class="card" style="padding:8px; overflow-x:auto;"><table class="data-table" id="attTable"><thead><tr><th>#</th><th>인적사항</th><th>좌석</th><th>체크시간</th><th>출결상태</th></tr></thead><tbody id="attBody"></tbody></table></div>
  </div>
  <div class="tab-panel" id="panelSettings">
    <div class="card"><h3>⚙️ API 연결</h3><div class="settings-item"><label>Apps Script 배포 URL</label><input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec"><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn btn-sm btn-primary" onclick="saveApiUrl()" style="flex:1;">💾 저장</button><button class="btn btn-sm btn-success" onclick="doPing()" style="flex:1;">🔗 연결 테스트</button></div></div></div>
    <div class="card"><h3>🔐 관리자 기능</h3><div class="settings-item"><label>관리자 비밀번호</label><input type="password" id="adminPw" placeholder="비밀번호 입력"></div><div class="settings-item"><button class="btn btn-danger" onclick="resetSession()">🗑️ 현재 시간대 초기화</button></div><div class="settings-item"><button class="btn btn-danger" onclick="resetAll()">⚠️ 오늘 전체 초기화</button></div></div>
    <div class="card"><h3>ℹ️ 공유 링크</h3><div class="settings-item"><label>교사용 URL</label><input type="text" id="teacherUrl" readonly onclick="this.select()"></div><div class="settings-item"><label>학생용 URL</label><input type="text" id="studentUrl" readonly onclick="this.select()"></div></div>
  </div>
  <nav class="tab-bar">
    <div class="tab-item active" data-tab="panelCheckIn" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span>출석체크</span></div>
    <div class="tab-item" data-tab="panelSeatMap" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>좌석현황</span></div>
    <div class="tab-item" data-tab="panelRegistration" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/></svg><span>자습신청</span></div>
    <div class="tab-item" data-tab="panelAttendance" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg><span>출결관리</span></div>
    <div class="tab-item" data-tab="panelSettings" onclick="switchTab(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><span>설정</span></div>
  </nav>
</div>
<div id="studentMode" style="display:none;" class="student-mode">
  <div class="header" style="border-radius:0;"><h1>🏫 야자 출석체크</h1><select class="session-select" id="studentSessionSelect"><option value="8교시">8교시</option><option value="9교시">9교시</option><option value="야자">야자</option><option value="토요오전">토요(오전)</option><option value="토요오후">토요(오후)</option></select></div>
  <div class="logo"><h2>야간자율학습</h2><p>출석체크 시스템</p></div>
  <div class="card"><div class="form-row"><div class="form-group"><label>반</label><select id="sClass"><option value="">선택</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div><div class="form-group"><label>번호</label><input type="number" id="sNumber" placeholder="번호" min="1" max="40"></div></div><div class="form-row"><div class="form-group"><label>이름</label><input type="text" id="sName" placeholder="이름 입력"></div><div class="form-group"><label>좌석번호</label><input type="number" id="sSeat" placeholder="0~81" min="0" max="81"></div></div><button class="btn btn-primary" onclick="doStudentCheckIn()" style="margin-top:4px;">✅ 출석체크</button></div>
  <div class="result-box" id="studentResult"></div>
</div>
<script>
let API_URL = localStorage.getItem('yaja_api_url') || '';
let currentSession = '8교시';
let isStudentMode = false;
let isConnected = false;
let cachedStudents = [];
let cachedRegistrationAll = [];
let cachedAttendance = [];
let seatOccupancy = {};
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  isStudentMode = params.get('mode') === 'student';
  if (isStudentMode) {
    const apiParam = params.get('api');
    if (apiParam) { API_URL = decodeURIComponent(apiParam); localStorage.setItem('yaja_api_url', API_URL); }
    document.getElementById('studentMode').style.display = 'block';
    document.getElementById('teacherMode').style.display = 'none';
  } else {
    document.getElementById('teacherMode').style.display = 'block';
    document.getElementById('studentMode').style.display = 'none';
    document.getElementById('apiUrl').value = API_URL;
    updateShareLinks();
    buildSeatGrid();
    if (API_URL) { doPing().then(() => { if (isConnected) loadAllData(); }); }
    else { toast('⚙️ 설정 탭에서 API URL을 입력해주세요.', 'warning'); }
  }
});
async function apiCall(action, extraParams = {}, payload = null) {
  const url = API_URL || getApiUrl();
  if (!url) { toast('API URL이 설정되지 않았습니다.', 'error'); return null; }
  const params = new URLSearchParams({ action, ...extraParams });
  if (payload) params.set('payload', encodeURIComponent(JSON.stringify(payload)));
  const fullUrl = url + '?' + params.toString();
  showLoading(true);
  try {
    const res = await fetch(fullUrl, { method: 'GET', redirect: 'follow', mode: 'cors' });
    const data = await res.json();
    return data;
  } catch (e) {
    console.error('API Error:', e);
    toast('API 오류: ' + e.message, 'error');
    return null;
  } finally {
    showLoading(false);
  }
}
function getApiUrl() { if (isStudentMode) return new URLSearchParams(window.location.search).get('api') || localStorage.getItem('yaja_api_url') || ''; return API_URL; }
async function doPing() { const badge = document.getElementById('connBadge'); try { const res = await apiCall('ping'); if (res && res.success) { isConnected = true; if (badge) { badge.textContent = '연결됨'; badge.className = 'badge badge-ok'; } toast('✅ 서버 연결 성공! ' + (res.time || ''), 'success'); } else { isConnected = false; if (badge) { badge.textContent = '오류'; badge.className = 'badge badge-err'; } toast('❌ 서버 응답 오류: ' + (res ? res.error : ''), 'error'); } } catch (e) { isConnected = false; if (badge) { badge.textContent = '미연결'; badge.className = 'badge badge-err'; } toast('❌ 연결 실패: ' + e.message, 'error'); } }
async function loadAllData() { await Promise.all([loadStudents(), loadRegistrationAll(), loadAttendance()]); renderSeatMap(); }
async function loadStudents() { const res = await apiCall('getStudents'); if (res && res.success) cachedStudents = res.data; }
async function loadRegistrationAll() { const res = await apiCall('getRegistrationAll'); if (res && res.success) { cachedRegistrationAll = res.data; renderRegistration(); } }
async function loadAttendance() { const res = await apiCall('getAttendance', { session: currentSession }); if (res && res.success) { cachedAttendance = res.data; buildSeatOccupancy(); renderSeatMap(); renderAttendance(); renderRecentList(); } }
function buildSeatOccupancy() { seatOccupancy = {}; for (const rec of cachedAttendance) { if (rec.seat !== null && rec.seat !== '' && rec.seat !== undefined) { const s = Number(rec.seat); if (!seatOccupancy[s]) seatOccupancy[s] = []; seatOccupancy[s].push(rec); } } }
function onSessionChange() { currentSession = document.getElementById('sessionSelect').value; if (API_URL && isConnected) loadAttendance(); }
function switchTab(el) { document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active')); el.classList.add('active'); document.getElementById(el.dataset.tab).classList.add('active'); const tab = el.dataset.tab; if (API_URL && isConnected) { if (tab === 'panelSeatMap' || tab === 'panelAttendance') loadAttendance(); if (tab === 'panelRegistration') loadRegistrationAll(); } }
async function doCheckIn() { const cls = document.getElementById('ciClass').value; const num = document.getElementById('ciNumber').value; const name = document.getElementById('ciName').value.trim(); const seat = document.getElementById('ciSeat').value; if (!cls || !num || !name || seat === '') { toast('모든 항목을 입력해주세요.', 'warning'); return; } const code = '3' + cls + String(num).padStart(2, '0'); const session = document.getElementById('sessionSelect').value; const res = await apiCall('checkIn', {}, { code, seat: Number(seat), session }); if (res && res.success) { toast(res.message + ' (' + code + ' ' + name + ' → ' + seat + '번)', res.duplicate ? 'warning' : 'success'); document.getElementById('ciSeat').value = ''; await loadAttendance(); } else if (res) { toast(res.error, 'error'); } }
async function doStudentCheckIn() { const cls = document.getElementById('sClass').value; const num = document.getElementById('sNumber').value; const name = document.getElementById('sName').value.trim(); const seat = document.getElementById('sSeat').value; const rb = document.getElementById('studentResult'); rb.className = 'result-box'; rb.style.display = 'none'; if (!cls || !num || !name || seat === '') { rb.className = 'result-box error'; rb.textContent = '❌ 모든 항목을 입력해주세요.'; rb.style.display = 'block'; return; } const code = '3' + cls + String(num).padStart(2, '0'); const session = document.getElementById('studentSessionSelect').value; const res = await apiCall('checkIn', {}, { code, seat: Number(seat), session }); if (res && res.success) { rb.className = res.duplicate ? 'result-box warning' : 'result-box success'; rb.textContent = res.duplicate ? '⚠️ 출석 완료! (좌석 ' + seat + '번 - 중복 주의)' : '✅ 출석 완료! 좌석 ' + seat + '번'; rb.style.display = 'block'; } else { rb.className = 'result-box error'; rb.textContent = '❌ ' + (res ? res.error : '서버 연결 오류'); rb.style.display = 'block'; } }
function renderRecentList() { const list = document.getElementById('recentList'); const recent = [...cachedAttendance].filter(r => r.seat !== null && r.seat !== '').sort((a, b) => (b.checkTime || '').localeCompare(a.checkTime || '')).slice(0, 10); if (recent.length === 0) { list.innerHTML = '<li style="color:var(--text-light);justify-content:center;">출석 기록이 없습니다.</li>'; return; } list.innerHTML = recent.map(r => `<li><span><strong>${r.code} ${r.name}</strong></span><span><span class="seat-badge">${r.seat}번</span><span style="font-size:11px;color:var(--text-light);margin-left:6px;">${r.checkTime||''}</span></span></li>`).join(''); }
const SEAT_MAP = {1:{c:1,r:1},2:{c:2,r:1},3:{c:3,r:1},4:{c:4,r:1},5:{c:7,r:1},6:{c:8,r:1},7:{c:9,r:1},8:{c:12,r:1},9:{c:13,r:1},10:{c:14,r:1},11:{c:1,r:3},12:{c:2,r:3},13:{c:1,r:4},14:{c:2,r:4},15:{c:1,r:6},16:{c:2,r:6},17:{c:1,r:7},18:{c:2,r:7},19:{c:1,r:9},20:{c:2,r:9},21:{c:1,r:10},22:{c:2,r:10},23:{c:5,r:4},24:{c:6,r:4},25:{c:5,r:6},26:{c:6,r:6},27:{c:5,r:7},28:{c:6,r:7},35:{c:5,r:9},36:{c:6,r:9},37:{c:5,r:10},38:{c:6,r:10},39:{c:5,r:11},40:{c:6,r:11},29:{c:9,r:4},30:{c:10,r:4},31:{c:9,r:6},32:{c:10,r:6},33:{c:9,r:7},34:{c:10,r:7},41:{c:9,r:9},42:{c:10,r:9},43:{c:9,r:10},44:{c:10,r:10},45:{c:9,r:11},46:{c:10,r:11},47:{c:1,r:12},48:{c:2,r:12},49:{c:3,r:12},50:{c:1,r:13},51:{c:2,r:13},52:{c:3,r:13},53:{c:1,r:15},54:{c:2,r:15},55:{c:3,r:15},56:{c:1,r:16},57:{c:2,r:16},58:{c:3,r:16},66:{c:7,r:12},67:{c:8,r:12},68:{c:9,r:12},69:{c:10,r:12},70:{c:7,r:13},71:{c:8,r:13},72:{c:9,r:13},73:{c:10,r:13},74:{c:7,r:15},75:{c:8,r:15},76:{c:9,r:15},77:{c:10,r:15},78:{c:7,r:16},79:{c:8,r:16},80:{c:9,r:16},81:{c:10,r:16},59:{c:1,r:18},60:{c:2,r:18},61:{c:3,r:18},62:{c:4,r:18},63:{c:5,r:18},64:{c:6,r:18},65:{c:7,r:18}};
function buildSeatGrid() { const grid = document.getElementById('seatGrid'); if (!grid) return; grid.innerHTML = ''; for (let num = 1; num <= 81; num++) { const pos = SEAT_MAP[num]; if (!pos) continue; const div = document.createElement('div'); div.className = 'seat'; div.id = 'seat-' + num; div.dataset.seat = num; div.style.gridColumn = pos.c; div.style.gridRow = pos.r; div.innerHTML = `<span class="seat-num">${num}</span><span class="seat-name"></span>`; div.onclick = () => onSeatClick(num); grid.appendChild(div); } const sup = document.createElement('div'); sup.className = 'supervisor-icon'; sup.style.gridColumn = '15/17'; sup.style.gridRow = '13/15'; sup.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg><span>감독</span>`; grid.appendChild(sup); const zero = document.createElement('div'); zero.className = 'seat seat-zero'; zero.id = 'seat-0'; zero.dataset.seat = '0'; zero.style.gridColumn = '10/18'; zero.style.gridRow = '18/20'; zero.innerHTML = `<span class="seat-num">0 (기타공간)</span><span class="seat-name" style="white-space:normal;max-width:100%;font-size:9px;"></span>`; zero.onclick = () => onSeatClick(0); grid.appendChild(zero); }
function renderSeatMap() { for (let i = 0; i <= 81; i++) { const el = document.getElementById('seat-' + i); if (!el) continue; el.className = i === 0 ? 'seat seat-zero' : 'seat'; el.querySelector('.seat-name').textContent = ''; } let tot = 0, dup = 0; for (const [sn, recs] of Object.entries(seatOccupancy)) { const el = document.getElementById('seat-' + sn); if (!el) continue; const nm = el.querySelector('.seat-name'); if (recs.length === 1) { el.classList.add('occupied'); nm.textContent = recs[0].name; tot++; } else if (recs.length > 1) { el.classList.add('duplicate'); nm.textContent = recs.map(r=>r.name).join(', '); dup++; tot += recs.length; } } document.getElementById('statTotal').textContent = tot; document.getElementById('statVacant').textContent = 82 - Object.keys(seatOccupancy).length; document.getElementById('statDuplicate').textContent = dup; }
function onSeatClick(seatNum) { const recs = seatOccupancy[seatNum] || []; const modal = document.getElementById('modalContent'); if (recs.length === 0) { modal.innerHTML = `<h3>좌석 ${seatNum}번</h3><p>빈 좌석입니다.</p><div class="modal-actions"><button class="btn btn-sm" onclick="closeModal()" style="background:var(--border);">닫기</button></div>`; } else { const sh = recs.map(r => `<div style="padding:8px 0;border-bottom:1px solid var(--border);"><p><strong>${r.code} ${r.name}</strong> | 좌석 ${r.seat}번</p><p style="font-size:11px;">체크: ${r.checkTime||'-'} | 상태: ${r.status}</p><div style="margin-top:6px;display:flex;gap:6px;"><button class="btn btn-sm btn-primary" onclick="promptMove('${r.code}')">🔀 이동</button><button class="btn btn-sm btn-danger" onclick="promptDelete('${r.code}','${r.name}')">🗑️ 삭제</button></div></div>`).join(''); modal.innerHTML = `<h3>좌석 ${seatNum}번 ${recs.length>1?'⚠️ 중복!':''}</h3>${sh}<div class="modal-actions" style="margin-top:12px;"><button class="btn btn-sm" onclick="closeModal()" style="background:var(--border);">닫기</button></div>`; } document.getElementById('modalBg').classList.add('show'); }
async function promptMove(code) { const ns = prompt('이동할 좌석 번호 (0~81):'); if (ns === null) return; const today = new Date().toISOString().slice(0,10); const res = await apiCall('moveStudent', {}, { date:todday, session:currentSession, code, newSeat:Number(ns) }); if (res && res.success) { toast(res.message,'success'); closeModal(); await loadAttendance(); } else if (res) toast(res.error,'error'); }
async function promptDelete(code, name) { if (!confirm(code+' '+name+'의 출석 기록을 삭제하시겠습니까?')) return; const today = new Date().toISOString().slice(0,10); const res = await apiCall('deleteCheckIn', {}, { date:today, session:currentSession, code }); if (res && res.success) { toast(res.message,'success'); closeModal(); await loadAttendance(); } else if (res) toast(res.error,'error'); }
function renderRegistration() { const f = document.getElementById('regClassFilter').value; const body = document.getElementById('regBody'); const sessions = ['8교시','9교시','야자','토요오전','토요오후']; let list = cachedRegistrationAll; if (f) list = list.filter(s => String(s.classNum) === f); list.sort((a,b) => a.classNum - b.classNum || a.number - b.number); document.getElementById('regCount').textContent = list.length + '명'; body.innerHTML = list.map((s,i) => { const cks = sessions.map(ss => { const chk = s.sessions[ss] ? 'checked' : ''; return `<td class="checkbox-cell"><input type="checkbox" ${chk} onchange="toggleReg('${s.code}','${ss}',this.checked)"></td>`; }).join(''); return `<tr><td>${i+1}</td><td style="text-align:left;font-weight:600;">${s.code} ${s.name}</td>${cks}</tr>`; }).join(''); }
async function toggleReg(code, session, value) { const res = await apiCall('toggleRegistration', {}, { code, session, value, source:'교사앱' }); if (res && res.success) { toast(res.message, 'success'); const st = cachedRegistrationAll.find(s => s.code === code); if (st) st.sessions[session] = value; } else if (res) toast(res.error, 'error'); }
function renderAttendance() { const f = document.getElementById('attClassFilter').value; const body = document.getElementById('attBody'); let regCodes = new Set(); for (const s of cachedRegistrationAll) { if (s.sessions[currentSession]) regCodes.add(s.code); } let records = []; for (const code of regCodes) { const att = cachedAttendance.find(a => a.code === code); const st = cachedRegistrationAll.find(s => s.code === code); if (!st) continue; if (f && String(st.classNum) !== f) continue; records.push({ code:st.code, classNum:st.classNum, number:st.number, name:st.name, seat:att?att.seat:null, checkTime:att?att.checkTime:'', status:att?att.status:'결석' }); } records.sort((a,b) => a.classNum-b.classNum || a.number-b.number); const total=records.length, present=records.filter(r=>r.status==='출석').length, absent=records.filter(r=>r.status==='결석').length, excused=records.filter(r=>r.status==='확인결석').length; document.getElementById('attTotal').textContent = total; document.getElementById('attPresent').textContent = present; document.getElementById('attAbsent').textContent = absent; document.getElementById('attExcused').textContent = excused; body.innerHTML = records.map((r,i) => `<tr><td>${i+1}</td><td style="text-align:left;font-weight:600;">${r.code} ${r.name}</td><td>${r.seat!==null&&r.seat!==''?r.seat+'번':'-'}</td><td>${r.checkTime||'-'}</td><td><div class="radio-group"><label class="${r.status==='출석'?'status-present':''}"><input type="radio" name="att_${r.code}" value="출석" ${r.status==='출석'?'checked':''} onchange="changeAttStatus('${r.code}','출석')">출석</label><label class="${r.status==='결석'?'status-absent':''}"><input type="radio" name="att_${r.code}" value="결석" ${r.status==='결석'?'checked':''} onchange="changeAttStatus('${r.code}','결석')">결석</label><label class="${r.status==='확인결석'?'status-excused':''}"><input type="radio" name="att_${r.code}" value="확인결석" ${r.status==='확인결석'?'checked':''} onchange="changeAttStatus('${r.code}','확인결석')">확인결석</label></div></td></tr>`).join(''); }
async function changeAttStatus(code, status) { const today = new Date().toISOString().slice(0,10); const res = await apiCall('updateAttendanceStatus', {}, { date:today, session:currentSession, code, status }); if (res && res.success) { toast(code+' → '+status, 'success'); const att = cachedAttendance.find(a => a.code === code); if (att) att.status = status; renderAttendance(); } else if (res) toast(res.error, 'error'); }
async function initAttRecords() { if (!confirm('현재 시간대('+currentSession+') 신청자의 출석부를 생성하시겠습니까?\n(기존 기록 유지)')) return; const res = await apiCall('initAttendanceRecords', {}, { session:currentSession }); if (res && res.success) { toast(res.message, 'success'); await loadAttendance(); } else if (res) toast(res.error, 'error'); }
function saveApiUrl() { const url = document.getElementById('apiUrl').value.trim(); if (!url) { toast('URL을 입력해주세요.', 'warning'); return; } API_URL = url; localStorage.setItem('yaja_api_url', url); toast('API URL 저장 완료!', 'success'); updateShareLinks(); }
function updateShareLinks() { const base = window.location.origin + window.location.pathname; const tu = document.getElementById('teacherUrl'); const su = document.getElementById('studentUrl'); if (tu) tu.value = base; if (su) su.value = base + '?mode=student&api=' + encodeURIComponent(API_URL); }
async function resetSession() { const pw = document.getElementById('adminPw').value; if (!pw) { toast('비밀번호를 입력해주세요.', 'warning'); return; } if (!confirm(currentSession+' 시간대의 오늘 데이터를 초기화하시겠습니까?')) return; const res = await apiCall('resetSession', {}, { session:currentSession, password:pw }); if (res && res.success) { toast(res.message, 'success'); await loadAttendance(); } else if (res) toast(res.error, 'error'); }
async function resetAll() { const pw = document.getElementById('adminPw').value; if (!pw) { toast('비밀번호를 입력해주세요.', 'warning'); return; } if (!confirm('⚠️ 오늘의 모든 시간대 데이터를 초기화하시겠습니까?')) return; const res = await apiCall('resetAll', {}, { password:pw }); if (res && res.success) { toast(res.message, 'success'); await loadAttendance(); } else if (res) toast(res.error, 'error'); }
function toast(msg, type='') { const c = document.getElementById('toastContainer'); const d = document.createElement('div'); d.className = 'toast ' + type; d.textContent = msg; c.appendChild(d); setTimeout(()=>d.remove(), 3000); }
function showLoading(show) { document.getElementById('loadingOverlay').classList.toggle('show', show); }
function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
